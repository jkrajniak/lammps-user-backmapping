# Melamine-formaldehyde backmapping settings
# 3 CG beads (A1, A2, A3) in triangular topology, 27 AT atoms per molecule
# CG interactions: tabulated bonds
# AT interactions: OPLS/AA

molecules:
- name: MF
  ident: MF
  source:
    coordinates: single_mf.gro
    topology: topol_aa.top
  beads:
  - name: A1
    type: A
    atoms:
    - 1:MF:N11
    - 1:MF:C11
    - 1:MF:N21
    - 1:MF:C1
    - 1:MF:O1
    - 1:MF:H01
    - 1:MF:H011
    - 1:MF:H012
    - 1:MF:H21
  - name: A2
    type: A
    atoms:
    - 1:MF:N12
    - 1:MF:C12
    - 1:MF:N22
    - 1:MF:C2
    - 1:MF:O2
    - 1:MF:H02
    - 1:MF:H021
    - 1:MF:H022
    - 1:MF:H31
  - name: A3
    type: A
    atoms:
    - 1:MF:N13
    - 1:MF:C13
    - 1:MF:N23
    - 1:MF:C3
    - 1:MF:O3
    - 1:MF:H03
    - 1:MF:H031
    - 1:MF:H032
    - 1:MF:H11
cg_system:
  coordinates: cg_conf.gro
  topology: topol_cg.top
  format: gromacs
